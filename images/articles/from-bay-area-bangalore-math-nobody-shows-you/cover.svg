<svg viewBox="0 0 2100 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Sky: night left → twilight → sunset gold right -->
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0a1828"/>
      <stop offset="22%" stop-color="#152848"/>
      <stop offset="42%" stop-color="#3a3656"/>
      <stop offset="58%" stop-color="#6a4458"/>
      <stop offset="76%" stop-color="#c0784a"/>
      <stop offset="92%" stop-color="#e8a960"/>
      <stop offset="100%" stop-color="#f4c47a"/>
    </linearGradient>
    <!-- Vertical vignette for depth -->
    <linearGradient id="vignette" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0.42"/>
      <stop offset="40%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.45"/>
    </linearGradient>
    <!-- Sun -->
    <radialGradient id="sunGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fff7d6" stop-opacity="1"/>
      <stop offset="18%" stop-color="#ffe19a" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#e8a960" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#e8a960" stop-opacity="0"/>
    </radialGradient>
    <!-- Moon glow -->
    <radialGradient id="moonGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#eef3f9" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#eef3f9" stop-opacity="0"/>
    </radialGradient>
    <!-- Water -->
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e1a2c" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#03070d" stop-opacity="1"/>
    </linearGradient>
    <!-- Warm reflection from sunset -->
    <linearGradient id="reflectWarm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8a960" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#e8a960" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ════════ SKY ════════ -->
  <rect width="2100" height="900" fill="url(#sky)"/>
  <rect width="2100" height="900" fill="url(#vignette)"/>

  <!-- Sun (right) -->
  <circle cx="1700" cy="430" r="420" fill="url(#sunGlow)"/>
  <circle cx="1700" cy="430" r="78" fill="#fff5cc" opacity="0.96"/>

  <!-- Moon (left) -->
  <circle cx="380" cy="195" r="68" fill="url(#moonGlow)"/>
  <circle cx="380" cy="195" r="32" fill="#e8eef4" opacity="0.92"/>
  <circle cx="372" cy="188" r="6" fill="#c8d6e5" opacity="0.5"/>
  <circle cx="388" cy="202" r="4" fill="#c8d6e5" opacity="0.4"/>

