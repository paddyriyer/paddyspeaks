  <!-- ════════ AIRPLANE ARC ════════ -->
  <!-- Dotted trail from Bay Area side rising and descending to India -->
  <path d="M 470,320 Q 1050,60 1660,320"
        fill="none" stroke="#eef3f9" stroke-width="2" stroke-dasharray="3 9" opacity="0.7"/>

  <!-- Airplane (heading right, slightly descending) - sized for thumbnail legibility -->
