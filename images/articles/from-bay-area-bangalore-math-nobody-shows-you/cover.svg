    <rect x="22"  y="585" width="3" height="4"/>
    <rect x="34"  y="610" width="3" height="4"/>
    <rect x="46"  y="640" width="3" height="4"/>
    <rect x="68"  y="540" width="3" height="4"/>
    <rect x="80"  y="565" width="3" height="4"/>
    <rect x="80"  y="600" width="3" height="4"/>
