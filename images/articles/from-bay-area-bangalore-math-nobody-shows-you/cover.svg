    <rect x="55"  y="510" width="38" height="190"/>
    <rect x="93"  y="525" width="42" height="175"/>
    <rect x="135" y="490" width="48" height="210"/>
    <rect x="183" y="510" width="32" height="190"/>
    <rect x="215" y="525" width="40" height="175"/>
    <rect x="255" y="498" width="46" height="202"/>
    <rect x="301" y="528" width="34" height="172"/>
    <rect x="335" y="540" width="30" height="160"/>
