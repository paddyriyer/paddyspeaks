<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Gradient backgrounds -->
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#1A1420"/>
      <stop offset="40%" stop-color="#1E1832"/>
      <stop offset="100%" stop-color="#141018"/>
    </linearGradient>
    <linearGradient id="abyss-glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#2D1F3D" stop-opacity="0"/>
      <stop offset="50%" stop-color="#6B4C8A" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#1A1420" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="search-bar-bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#F8F6F3" stop-opacity="0.95"/>
    </linearGradient>

    <!-- Pastel block gradients -->
    <linearGradient id="pastel-peach" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDDCCC"/>
      <stop offset="100%" stop-color="#F5C4A8"/>
    </linearGradient>
    <linearGradient id="pastel-lavender" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0D4F0"/>
      <stop offset="100%" stop-color="#C8B8E0"/>
    </linearGradient>
    <linearGradient id="pastel-mint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C8ECD8"/>
      <stop offset="100%" stop-color="#A8D8B8"/>
    </linearGradient>
    <linearGradient id="pastel-sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C4DDF0"/>
      <stop offset="100%" stop-color="#A0C4E0"/>
    </linearGradient>
    <linearGradient id="pastel-rose" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0C8D0"/>
      <stop offset="100%" stop-color="#E0A8B8"/>
    </linearGradient>
    <linearGradient id="pastel-butter" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FBF0C8"/>
      <stop offset="100%" stop-color="#F0E0A0"/>
    </linearGradient>
    <linearGradient id="pastel-coral" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8D0C0"/>
      <stop offset="100%" stop-color="#F0B8A0"/>
    </linearGradient>
    <linearGradient id="pastel-lilac" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D8C8F0"/>
      <stop offset="100%" stop-color="#BCA8E0"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="glow-soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow-float" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <filter id="shadow-deep" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="blur-bg" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>

    <!-- Connection line pattern -->
    <pattern id="dots" patternUnits="userSpaceOnUse" width="20" height="20">
      <circle cx="2" cy="2" r="0.8" fill="#6B4C8A" opacity="0.15"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Ambient glow orbs -->
  <ellipse cx="350" cy="280" rx="300" ry="200" fill="#6B4C8A" opacity="0.06" filter="url(#blur-bg)"/>
  <ellipse cx="850" cy="350" rx="250" ry="180" fill="#C8956C" opacity="0.05" filter="url(#blur-bg)"/>
  <ellipse cx="600" cy="500" rx="350" ry="150" fill="#4A7FB5" opacity="0.04" filter="url(#blur-bg)"/>

  <!-- Thin connection lines (broken/dashed - representing fragmented data) -->
  <line x1="400" y1="155" x2="185" y2="225" stroke="#C8956C" stroke-width="1" stroke-dasharray="4,8" opacity="0.2"/>
  <line x1="800" y1="155" x2="920" y2="210" stroke="#6B4C8A" stroke-width="1" stroke-dasharray="4,8" opacity="0.2"/>
  <line x1="550" y1="155" x2="440" y2="280" stroke="#4A7FB5" stroke-width="1" stroke-dasharray="4,8" opacity="0.15"/>
  <line x1="700" y1="155" x2="760" y2="295" stroke="#C45C4A" stroke-width="1" stroke-dasharray="4,8" opacity="0.15"/>
  <line x1="600" y1="155" x2="600" y2="365" stroke="#5A8A6C" stroke-width="1" stroke-dasharray="3,10" opacity="0.12"/>
  <line x1="185" y1="290" x2="310" y2="380" stroke="#C8956C" stroke-width="0.8" stroke-dasharray="3,9" opacity="0.12"/>
  <line x1="920" y1="280" x2="870" y2="390" stroke="#6B4C8A" stroke-width="0.8" stroke-dasharray="3,9" opacity="0.12"/>
  <line x1="440" y1="340" x2="340" y2="465" stroke="#4A7FB5" stroke-width="0.8" stroke-dasharray="3,9" opacity="0.1"/>
  <line x1="760" y1="355" x2="830" y2="460" stroke="#C45C4A" stroke-width="0.8" stroke-dasharray="3,9" opacity="0.1"/>

  <!-- ═══════ SEARCH BAR (Top Center) ═══════ -->
  <g transform="translate(250, 65)" filter="url(#shadow-deep)">
    <rect width="700" height="56" rx="28" fill="url(#search-bar-bg)"/>
    <rect width="700" height="56" rx="28" fill="none" stroke="#E0DCD5" stroke-width="1"/>
    <!-- Google-esque colored dots -->
    <circle cx="28" cy="28" r="5" fill="#4285F4" opacity="0.7"/>
    <circle cx="42" cy="28" r="5" fill="#EA4335" opacity="0.7"/>
    <circle cx="56" cy="28" r="5" fill="#FBBC05" opacity="0.7"/>
    <circle cx="70" cy="28" r="5" fill="#34A853" opacity="0.7"/>
    <!-- Search text -->
    <text x="92" y="33" font-family="'SF Pro Display', -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="15" fill="#3C4043" letter-spacing="0.2">which is better — M4 or M5 MacBook Air for data work</text>
    <!-- Search icon -->
    <circle cx="660" cy="28" r="10" fill="none" stroke="#9AA0A6" stroke-width="1.5"/>
    <line x1="667" y1="35" x2="674" y2="42" stroke="#9AA0A6" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Cursor blink -->
    <rect x="504" y="18" width="1.5" height="20" fill="#4285F4" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- ═══════ FLOATING BLOCKS ═══════ -->

  <!-- Block 1: COOKIES (top left) -->
  <g transform="translate(68, 195) rotate(-3)" filter="url(#shadow-float)">
    <rect width="190" height="105" rx="12" fill="url(#pastel-peach)"/>
    <text x="16" y="28" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="9" fill="#9E6B3A" letter-spacing="1.5" text-transform="uppercase" opacity="0.7">COOKIES &amp; TRACKERS</text>
    <line x1="16" y1="36" x2="110" y2="36" stroke="#9E6B3A" stroke-width="0.5" opacity="0.3"/>
    <!-- Cookie icon -->
    <circle cx="155" cy="24" r="14" fill="#E8B080" opacity="0.4"/>
    <text x="149" y="30" font-size="16">&#x1F36A;</text>
    <!-- Mini data rows -->
    <rect x="16" y="46" width="90" height="6" rx="3" fill="#D4A070" opacity="0.35"/>
    <rect x="16" y="58" width="65" height="6" rx="3" fill="#D4A070" opacity="0.25"/>
    <rect x="16" y="70" width="110" height="6" rx="3" fill="#D4A070" opacity="0.2"/>
    <text x="16" y="92" font-family="'SF Mono', monospace" font-size="8" fill="#9E6B3A" opacity="0.5">3rd-party: blocked</text>
  </g>

  <!-- Block 2: SEO RANKING (top right) -->
  <g transform="translate(895, 185) rotate(2)" filter="url(#shadow-float)">
    <rect width="205" height="115" rx="12" fill="url(#pastel-lavender)"/>
    <text x="16" y="28" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="9" fill="#6B4C8A" letter-spacing="1.5" opacity="0.7">SEO RANKING</text>
    <line x1="16" y1="36" x2="100" y2="36" stroke="#6B4C8A" stroke-width="0.5" opacity="0.3"/>
    <!-- Bar chart -->
    <rect x="16" y="82" width="20" height="24" rx="2" fill="#BCA8E0" opacity="0.6"/>
    <rect x="42" y="68" width="20" height="38" rx="2" fill="#A888D0" opacity="0.6"/>
    <rect x="68" y="54" width="20" height="52" rx="2" fill="#9870C0" opacity="0.7"/>
    <rect x="94" y="72" width="20" height="34" rx="2" fill="#BCA8E0" opacity="0.5"/>
    <rect x="120" y="80" width="20" height="26" rx="2" fill="#D0C0E8" opacity="0.4"/>
    <!-- Labels -->
    <text x="130" y="28" font-family="'SF Mono', monospace" font-size="7" fill="#6B4C8A" opacity="0.5">#1-#10 SERP</text>
    <text x="16" y="48" font-family="'SF Pro', sans-serif" font-size="10" fill="#5A3D7A" opacity="0.7">Position tracking lost</text>
  </g>

  <!-- Block 3: CRM DATA (middle left) -->
  <g transform="translate(95, 340) rotate(1.5)" filter="url(#shadow-float)">
    <rect width="200" height="120" rx="12" fill="url(#pastel-sky)"/>
    <text x="16" y="28" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="9" fill="#2E6090" letter-spacing="1.5" opacity="0.7">CRM SILO</text>
    <line x1="16" y1="36" x2="80" y2="36" stroke="#2E6090" stroke-width="0.5" opacity="0.3"/>
    <!-- Contact card mockup -->
    <circle cx="34" cy="56" r="12" fill="#A0C4E0" opacity="0.5"/>
    <text x="28" y="60" font-size="13">&#x1F464;</text>
    <rect x="54" y="48" width="70" height="5" rx="2.5" fill="#80B0D0" opacity="0.5"/>
    <rect x="54" y="58" width="50" height="5" rx="2.5" fill="#80B0D0" opacity="0.35"/>
    <!-- Pipeline stages -->
    <rect x="16" y="80" width="35" height="14" rx="4" fill="#80B0D0" opacity="0.4"/>
    <text x="21" y="90" font-family="'SF Mono', monospace" font-size="7" fill="#2E6090" opacity="0.7">Lead</text>
    <rect x="56" y="80" width="35" height="14" rx="4" fill="#80B0D0" opacity="0.5"/>
    <text x="62" y="90" font-family="'SF Mono', monospace" font-size="7" fill="#2E6090" opacity="0.7">MQL</text>
    <rect x="96" y="80" width="35" height="14" rx="4" fill="#6090B0" opacity="0.5"/>
    <text x="103" y="90" font-family="'SF Mono', monospace" font-size="7" fill="#FFF" opacity="0.8">SQL</text>
    <rect x="136" y="80" width="48" height="14" rx="4" fill="#A0C4E0" opacity="0.3"/>
    <text x="140" y="90" font-family="'SF Mono', monospace" font-size="7" fill="#2E6090" opacity="0.5">???</text>
    <text x="16" y="110" font-family="'SF Mono', monospace" font-size="8" fill="#2E6090" opacity="0.45">No purchase signal</text>
  </g>

  <!-- Block 4: AI RECOMMENDATIONS (middle center) -->
  <g transform="translate(440, 265) rotate(-1)" filter="url(#shadow-float)">
    <rect width="220" height="130" rx="12" fill="url(#pastel-mint)"/>
    <text x="16" y="28" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="9" fill="#2E6B40" letter-spacing="1.5" opacity="0.7">AI RECOMMENDATION</text>
    <line x1="16" y1="36" x2="140" y2="36" stroke="#2E6B40" stroke-width="0.5" opacity="0.3"/>
    <!-- Chat bubble mockup -->
    <rect x="16" y="44" width="188" height="40" rx="8" fill="#FFF" opacity="0.5"/>
    <text x="24" y="59" font-family="'SF Pro', -apple-system, sans-serif" font-size="10" fill="#2A4A30" opacity="0.7">"Based on your workflow, I'd</text>
    <text x="24" y="73" font-family="'SF Pro', -apple-system, sans-serif" font-size="10" fill="#2A4A30" opacity="0.7">recommend the M4 Air..."</text>
    <!-- AI sparkle -->
    <text x="182" y="30" font-size="14" opacity="0.6">&#x2728;</text>
    <!-- Opaque label -->
    <rect x="16" y="94" width="130" height="22" rx="6" fill="#2E6B40" opacity="0.12"/>
    <text x="24" y="109" font-family="'SF Mono', monospace" font-size="8" fill="#2E6B40" opacity="0.6">&#x26A0; Source: opaque</text>
    <text x="155" y="120" font-family="'SF Mono', monospace" font-size="7" fill="#5A8A6C" opacity="0.4">no attribution</text>
  </g>

  <!-- Block 5: ERP SYSTEM (middle right) -->
  <g transform="translate(755, 285) rotate(2.5)" filter="url(#shadow-float)">
    <rect width="185" height="110" rx="12" fill="url(#pastel-rose)"/>
    <text x="16" y="28" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="9" fill="#8A3050" letter-spacing="1.5" opacity="0.7">ERP / INVENTORY</text>
    <line x1="16" y1="36" x2="120" y2="36" stroke="#8A3050" stroke-width="0.5" opacity="0.3"/>
    <!-- Database icon -->
    <ellipse cx="40" cy="56" rx="20" ry="8" fill="#E0A8B8" opacity="0.5"/>
    <rect x="20" y="56" width="40" height="20" fill="#E0A8B8" opacity="0.3"/>
    <ellipse cx="40" cy="76" rx="20" ry="8" fill="#E0A8B8" opacity="0.5"/>
    <!-- Data rows -->
    <rect x="75" y="48" width="90" height="5" rx="2.5" fill="#D090A0" opacity="0.4"/>
    <rect x="75" y="58" width="70" height="5" rx="2.5" fill="#D090A0" opacity="0.3"/>
    <rect x="75" y="68" width="80" height="5" rx="2.5" fill="#D090A0" opacity="0.25"/>
    <text x="16" y="100" font-family="'SF Mono', monospace" font-size="8" fill="#8A3050" opacity="0.45">Stock data ≠ demand data</text>
  </g>

  <!-- Block 6: SOCIAL SIGNAL (bottom left) -->
  <g transform="translate(265, 435) rotate(-2)" filter="url(#shadow-float)">
    <rect width="175" height="95" rx="12" fill="url(#pastel-butter)"/>
    <text x="16" y="26" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="9" fill="#8A7020" letter-spacing="1.5" opacity="0.7">SOCIAL SIGNAL</text>
    <line x1="16" y1="34" x2="105" y2="34" stroke="#8A7020" stroke-width="0.5" opacity="0.3"/>
    <!-- Social icons row -->
    <text x="16" y="56" font-size="14" opacity="0.5">&#x1F426;</text>
    <text x="38" y="56" font-size="14" opacity="0.5">&#x1F4F1;</text>
    <text x="60" y="56" font-size="14" opacity="0.5">&#x1F4AC;</text>
    <!-- Engagement bars -->
    <rect x="90" y="42" width="60" height="5" rx="2.5" fill="#D4C060" opacity="0.4"/>
    <rect x="90" y="52" width="40" height="5" rx="2.5" fill="#D4C060" opacity="0.3"/>
    <!-- Unconnected label -->
    <text x="16" y="82" font-family="'SF Mono', monospace" font-size="8" fill="#8A7020" opacity="0.45">Reviews ≠ CRM record</text>
  </g>

  <!-- Block 7: ANALYTICS (bottom center) -->
  <g transform="translate(505, 450) rotate(1)" filter="url(#shadow-float)">
    <rect width="185" height="100" rx="12" fill="url(#pastel-coral)"/>
    <text x="16" y="26" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="9" fill="#9E5030" letter-spacing="1.5" opacity="0.7">WEB ANALYTICS</text>
    <line x1="16" y1="34" x2="110" y2="34" stroke="#9E5030" stroke-width="0.5" opacity="0.3"/>
    <!-- Sparkline -->
    <polyline points="16,70 35,55 55,62 75,48 95,52 115,44 135,58 155,40" fill="none" stroke="#C87050" stroke-width="1.5" opacity="0.5"/>
    <circle cx="155" cy="40" r="3" fill="#C87050" opacity="0.6"/>
    <!-- Bounce label -->
    <text x="16" y="90" font-family="'SF Mono', monospace" font-size="8" fill="#9E5030" opacity="0.45">Bounce rate: 67% &#x2192; why?</text>
  </g>

  <!-- Block 8: DATA WAREHOUSE (bottom right) -->
  <g transform="translate(785, 430) rotate(-1.5)" filter="url(#shadow-float)">
    <rect width="175" height="95" rx="12" fill="url(#pastel-lilac)"/>
    <text x="16" y="26" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="9" fill="#5A3D7A" letter-spacing="1.5" opacity="0.7">DATA WAREHOUSE</text>
    <line x1="16" y1="34" x2="120" y2="34" stroke="#5A3D7A" stroke-width="0.5" opacity="0.3"/>
    <!-- Schema blocks -->
    <rect x="16" y="42" width="45" height="22" rx="4" fill="#BCA8E0" opacity="0.4"/>
    <text x="22" y="57" font-family="'SF Mono', monospace" font-size="7" fill="#5A3D7A" opacity="0.7">users</text>
    <rect x="68" y="42" width="45" height="22" rx="4" fill="#BCA8E0" opacity="0.4"/>
    <text x="72" y="57" font-family="'SF Mono', monospace" font-size="7" fill="#5A3D7A" opacity="0.7">events</text>
    <rect x="120" y="42" width="40" height="22" rx="4" fill="#BCA8E0" opacity="0.3"/>
    <text x="125" y="57" font-family="'SF Mono', monospace" font-size="7" fill="#5A3D7A" opacity="0.6">???</text>
    <!-- Join lines -->
    <line x1="61" y1="53" x2="68" y2="53" stroke="#5A3D7A" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.3"/>
    <line x1="113" y1="53" x2="120" y2="53" stroke="#5A3D7A" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.3"/>
    <text x="16" y="82" font-family="'SF Mono', monospace" font-size="8" fill="#5A3D7A" opacity="0.45">No journey-level join key</text>
  </g>

  <!-- ═══════ CENTER ABYSS VOID ═══════ -->
  <ellipse cx="600" cy="380" rx="80" ry="35" fill="#0D0A12" opacity="0.3" filter="url(#blur-bg)"/>

  <!-- Small floating particles/dots representing lost data -->
  <circle cx="520" cy="220" r="2" fill="#C8956C" opacity="0.4">
    <animate attributeName="cy" values="220;215;220" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="680" cy="240" r="1.5" fill="#6B4C8A" opacity="0.35">
    <animate attributeName="cy" values="240;234;240" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="310" r="2" fill="#4A7FB5" opacity="0.3">
    <animate attributeName="cy" values="310;305;310" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="780" cy="320" r="1.5" fill="#C45C4A" opacity="0.3">
    <animate attributeName="cy" values="320;314;320" dur="4.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="400" r="2.5" fill="#5A8A6C" opacity="0.2">
    <animate attributeName="cy" values="400;394;400" dur="3.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="420" r="1.5" fill="#D4A054" opacity="0.25">
    <animate attributeName="cy" values="420;415;420" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="850" cy="380" r="2" fill="#8A3050" opacity="0.2">
    <animate attributeName="cy" values="380;374;380" dur="3.2s" repeatCount="indefinite"/>
  </circle>

  <!-- ═══════ TITLE OVERLAY (bottom center, subtle) ═══════ -->
  <text x="600" y="590" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="17" font-weight="300" fill="#F5F0E8" letter-spacing="6" opacity="0.4">THE DECISION ABYSS</text>
  <text x="600" y="612" text-anchor="middle" font-family="'DM Mono', 'SF Mono', monospace" font-size="8" fill="#C8956C" letter-spacing="3" opacity="0.35">A FIVE-PART EDITORIAL SERIES · PADDYSPEAKS</text>
</svg>