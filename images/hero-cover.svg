<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" style="font-family:'DM Mono',monospace;">
  <defs>

    <!-- Background grain texture -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Glow filter for amber lines -->
    <filter id="amber-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Soft glow for nodes -->
    <filter id="node-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Gradient: dark base -->
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D0C0A"/>
      <stop offset="100%" stop-color="#1A1410"/>
    </linearGradient>

    <!-- Diagonal stripe pattern -->
    <pattern id="stripes" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <line x1="0" y1="60" x2="60" y2="0" stroke="rgba(200,134,10,0.035)" stroke-width="1"/>
    </pattern>

    <!-- Amber gradient for title accent -->
    <linearGradient id="amber-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8A020"/>
      <stop offset="100%" stop-color="#C8680A"/>
    </linearGradient>

    <!-- Node pulse gradient -->
    <radialGradient id="node-pulse" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8A020" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#E8A020" stop-opacity="0"/>
    </radialGradient>

    <!-- Clip for left graphic area -->
    <clipPath id="left-clip">
      <rect x="0" y="0" width="520" height="630"/>
    </clipPath>

  </defs>

  <!-- ── BASE ── -->
  <rect width="1200" height="630" fill="url(#bg-grad)"/>
  <rect width="1200" height="630" fill="url(#stripes)"/>

  <!-- ── AMBER TOP BORDER ── -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#amber-grad)"/>

  <!-- ══════════════════════════════════
       LEFT: ANIMATED NETWORK DIAGRAM
  ══════════════════════════════════ -->
  <g clip-path="url(#left-clip)" opacity="0.9">

    <!-- Grid of faint connector lines (background layer) -->
    <!-- FLOOR 1: The Oblivious — sparse, cold, dim connections -->
    <g opacity="0.18" stroke="#5A5040" stroke-width="0.8">
      <line x1="80" y1="500" x2="200" y2="500"/>
      <line x1="200" y1="500" x2="310" y2="500"/>
      <line x1="310" y1="500" x2="420" y2="500"/>
    </g>

    <!-- FLOOR 2: Misconfigured — some connections, warmer -->
    <g opacity="0.28" stroke="#8A6820" stroke-width="0.8">
      <line x1="60" y1="350" x2="180" y2="350"/>
      <line x1="180" y1="350" x2="280" y2="320"/>
      <line x1="280" y1="320" x2="390" y2="350"/>
      <line x1="390" y1="350" x2="460" y2="330"/>
      <line x1="180" y1="350" x2="180" y2="500"/>
      <line x1="280" y1="320" x2="280" y2="500"/>
    </g>

    <!-- FLOOR 3: Architect — full glowing network -->
    <g filter="url(#amber-glow)">
      <!-- Main network connections (bright amber) -->
      <g stroke="#C8860A" stroke-width="1" opacity="0.7">
        <line x1="80" y1="160" x2="200" y2="120"/>
        <line x1="200" y1="120" x2="320" y2="160"/>
        <line x1="320" y1="160" x2="420" y2="110"/>
        <line x1="80" y1="160" x2="120" y2="220"/>
        <line x1="200" y1="120" x2="240" y2="200"/>
        <line x1="320" y1="160" x2="300" y2="220"/>
        <line x1="420" y1="110" x2="440" y2="190"/>
        <line x1="120" y1="220" x2="240" y2="200"/>
        <line x1="240" y1="200" x2="300" y2="220"/>
        <line x1="300" y1="220" x2="440" y2="190"/>
        <line x1="120" y1="220" x2="160" y2="290"/>
        <line x1="240" y1="200" x2="240" y2="290"/>
        <line x1="300" y1="220" x2="340" y2="290"/>
        <line x1="440" y1="190" x2="460" y2="290"/>
        <!-- Cross connections -->
        <line x1="80"  y1="160" x2="240" y2="200"/>
        <line x1="200" y1="120" x2="300" y2="220"/>
        <line x1="320" y1="160" x2="440" y2="190"/>
        <line x1="160" y1="290" x2="340" y2="290"/>
        <line x1="240" y1="290" x2="460" y2="290"/>
      </g>

      <!-- Animated flowing lines (signals moving through network) -->
      <g stroke="#E8A020" stroke-width="1.5" stroke-linecap="round">
        <!-- Flow 1 -->
        <line x1="80" y1="160" x2="200" y2="120" stroke-dasharray="12 80" opacity="0.9">
          <animate attributeName="stroke-dashoffset" from="92" to="-92" dur="2.2s" repeatCount="indefinite"/>
        </line>
        <!-- Flow 2 -->
        <line x1="200" y1="120" x2="420" y2="110" stroke-dasharray="10 120" opacity="0.8">
          <animate attributeName="stroke-dashoffset" from="130" to="-130" dur="3s" repeatCount="indefinite"/>
        </line>
        <!-- Flow 3 -->
        <line x1="120" y1="220" x2="460" y2="290" stroke-dasharray="14 200" opacity="0.7">
          <animate attributeName="stroke-dashoffset" from="214" to="-214" dur="3.8s" repeatCount="indefinite"/>
        </line>
        <!-- Flow 4 (vertical) -->
        <line x1="240" y1="200" x2="240" y2="290" stroke-dasharray="8 60" opacity="0.75">
          <animate attributeName="stroke-dashoffset" from="68" to="-68" dur="1.8s" repeatCount="indefinite"/>
        </line>
        <!-- Flow 5 -->
        <line x1="300" y1="220" x2="160" y2="290" stroke-dasharray="10 100" opacity="0.65">
          <animate attributeName="stroke-dashoffset" from="110" to="-110" dur="2.6s" repeatCount="indefinite"/>
        </line>
      </g>
    </g>

    <!-- ── NODES: Floor 1 — The Oblivious (dim, gray, 4 isolated) ── -->
    <g opacity="0.35">
      <circle cx="80"  cy="500" r="8"  fill="#3A3530" stroke="#6A6050" stroke-width="1"/>
      <circle cx="200" cy="500" r="8"  fill="#3A3530" stroke="#6A6050" stroke-width="1"/>
      <circle cx="310" cy="500" r="8"  fill="#3A3530" stroke="#6A6050" stroke-width="1"/>
      <circle cx="420" cy="500" r="8"  fill="#3A3530" stroke="#6A6050" stroke-width="1"/>
    </g>

    <!-- ── NODES: Floor 2 — Misconfigured (dim amber) ── -->
    <g opacity="0.55">
      <circle cx="60"  cy="350" r="9"  fill="#3A2A10" stroke="#9A7020" stroke-width="1"/>
      <circle cx="180" cy="350" r="9"  fill="#3A2A10" stroke="#9A7020" stroke-width="1"/>
      <circle cx="280" cy="320" r="9"  fill="#3A2A10" stroke="#9A7020" stroke-width="1"/>
      <circle cx="390" cy="350" r="9"  fill="#3A2A10" stroke="#9A7020" stroke-width="1"/>
      <circle cx="460" cy="330" r="9"  fill="#3A2A10" stroke="#9A7020" stroke-width="1"/>
    </g>

    <!-- ── NODES: Floor 3 — Context Architects (bright amber, pulsing) ── -->
    <!-- Pulse halos -->
    <g opacity="0.0">
      <circle cx="200" cy="120" r="22" fill="url(#node-pulse)">
        <animate attributeName="r" values="14;26;14" dur="2.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.0;0.45;0.0" dur="2.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="320" cy="160" r="22" fill="url(#node-pulse)">
        <animate attributeName="r" values="14;24;14" dur="3.2s" begin="0.6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.0;0.4;0.0" dur="3.2s" begin="0.6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="240" cy="200" r="18" fill="url(#node-pulse)">
        <animate attributeName="r" values="12;22;12" dur="2.5s" begin="1.1s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.0;0.35;0.0" dur="2.5s" begin="1.1s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Main bright nodes -->
    <g filter="url(#node-glow)">
      <circle cx="80"  cy="160" r="10" fill="#C8860A" stroke="#E8A020" stroke-width="1.5"/>
      <circle cx="200" cy="120" r="13" fill="#E8A020" stroke="#FAC030" stroke-width="2"/>
      <circle cx="320" cy="160" r="11" fill="#C8860A" stroke="#E8A020" stroke-width="1.5"/>
      <circle cx="420" cy="110" r="10" fill="#B87010" stroke="#D89020" stroke-width="1.5"/>
      <circle cx="120" cy="220" r="9"  fill="#C8860A" stroke="#E8A020" stroke-width="1.5"/>
      <circle cx="240" cy="200" r="11" fill="#D89020" stroke="#FAC030" stroke-width="2"/>
      <circle cx="300" cy="220" r="9"  fill="#C8860A" stroke="#E8A020" stroke-width="1.5"/>
      <circle cx="440" cy="190" r="10" fill="#B87010" stroke="#D89020" stroke-width="1.5"/>
      <circle cx="160" cy="290" r="9"  fill="#C8860A" stroke="#E8A020" stroke-width="1.5"/>
      <circle cx="240" cy="290" r="10" fill="#D89020" stroke="#FAC030" stroke-width="1.5"/>
      <circle cx="340" cy="290" r="9"  fill="#C8860A" stroke="#E8A020" stroke-width="1.5"/>
      <circle cx="460" cy="290" r="9"  fill="#B87010" stroke="#D89020" stroke-width="1.5"/>
    </g>

    <!-- ── FLOOR LABELS (left side) ── -->
    <g font-family="'DM Mono',monospace" letter-spacing="2">
      <!-- Floor 1 label -->
      <text x="20" y="497" font-size="8" fill="#5A5040" text-anchor="start" opacity="0.6">~70% · THE OBLIVIOUS</text>

      <!-- Floor 2 label -->
      <text x="20" y="347" font-size="8" fill="#8A6820" text-anchor="start" opacity="0.7">~25% · MISCONFIGURED</text>

      <!-- Floor 3 label -->
      <text x="20" y="157" font-size="8" fill="#C8860A" text-anchor="start" opacity="0.9">~5% · CONTEXT ARCHITECTS</text>
    </g>

    <!-- ── HORIZONTAL FLOOR DIVIDERS ── -->
    <line x1="0" y1="400" x2="510" y2="400" stroke="#2A2418" stroke-width="1" stroke-dasharray="4,8"/>
    <line x1="0" y1="245" x2="510" y2="245" stroke="#2A2418" stroke-width="1" stroke-dasharray="4,8"/>

    <!-- ── VERTICAL FADE on right edge of diagram ── -->
    <rect x="400" y="0" width="120" height="630" fill="url(#bg-grad)" opacity="0.5"/>

  </g>

  <!-- ── VERTICAL SEPARATOR ── -->
  <line x1="520" y1="60" x2="520" y2="570" stroke="#2E2820" stroke-width="1"/>
  <line x1="521" y1="60" x2="521" y2="570" stroke="#3A3020" stroke-width="0.5"/>

  <!-- ══════════════════════════════════
       RIGHT: EDITORIAL TEXT BLOCK
  ══════════════════════════════════ -->

  <!-- Kicker -->
  <text x="560" y="120" font-family="'DM Mono',monospace" font-size="11" fill="#C8860A" letter-spacing="3" text-anchor="start" opacity="0.9">PADDYSPEAKS · AI AGE COLLECTION · VOL. 05</text>

  <!-- Main title — line 1 -->
  <text x="558" y="198" font-family="'Playfair Display',Georgia,serif" font-size="62" font-weight="900" fill="#F0E8D8" text-anchor="start" letter-spacing="-1">Why Most</text>

  <!-- Main title — line 2 -->
  <text x="558" y="268" font-family="'Playfair Display',Georgia,serif" font-size="62" font-weight="900" fill="#F0E8D8" text-anchor="start" letter-spacing="-1">AI Users</text>

  <!-- Main title — line 3 — italic accent word -->
  <text x="558" y="340" font-family="'Playfair Display',Georgia,serif" font-size="62" font-weight="900" text-anchor="start" letter-spacing="-1">
    <tspan fill="#F0E8D8">Are Still </tspan><tspan fill="#E8A020" font-style="italic">Pre-Literate</tspan>
  </text>

  <!-- Amber rule under title -->
  <rect x="558" y="362" width="560" height="2" fill="url(#amber-grad)" opacity="0.8"/>
  <rect x="558" y="365" width="240" height="1" fill="#C8860A" opacity="0.3"/>

  <!-- Subtitle / deck -->
  <text x="558" y="406" font-family="'DM Sans','Helvetica Neue',sans-serif" font-size="17" fill="#A09080" font-weight="300" letter-spacing="0.3">
    You can type a prompt. That doesn't mean you can read.
  </text>
  <text x="558" y="430" font-family="'DM Sans','Helvetica Neue',sans-serif" font-size="17" fill="#A09080" font-weight="300" letter-spacing="0.3">
    The real skill gap isn't access — it's what you do with it.
  </text>

  <!-- Three-floor stat bar -->
  <g transform="translate(558, 475)">
    <!-- Bar background -->
    <rect x="0" y="0" width="560" height="32" rx="3" fill="#1A1610" stroke="#2E2820" stroke-width="1"/>

    <!-- Floor segments with animation -->
    <rect x="1" y="1" width="392" height="30" rx="2" fill="#2A1F10" opacity="0.9"/>
    <rect x="1" y="1" width="392" height="30" rx="2" fill="#3A2A10">
      <animate attributeName="width" from="0" to="392" dur="1.4s" fill="freeze" begin="0.3s"/>
    </rect>
    <rect x="393" y="1" width="140" height="30" rx="2" fill="#3A2810">
      <animate attributeName="width" from="0" to="140" dur="0.9s" fill="freeze" begin="1.7s"/>
    </rect>
    <rect x="533" y="1" width="26" height="30" rx="2" fill="#C8860A" opacity="0.85">
      <animate attributeName="width" from="0" to="26" dur="0.4s" fill="freeze" begin="2.6s"/>
    </rect>

    <!-- Segment labels -->
    <text x="196" y="20" font-family="'DM Mono',monospace" font-size="9" fill="#7A6040" text-anchor="middle" letter-spacing="2">THE OBLIVIOUS ~70%</text>
    <text x="463" y="20" font-family="'DM Mono',monospace" font-size="9" fill="#9A7840" text-anchor="middle" letter-spacing="1">MISC. ~25%</text>
    <text x="546" y="20" font-family="'DM Mono',monospace" font-size="9" fill="#1A1410" text-anchor="middle" letter-spacing="0">5%</text>
  </g>

  <!-- Meta line -->
  <text x="558" y="555" font-family="'DM Mono',monospace" font-size="10" fill="#5A5040" letter-spacing="1.5">
    PADDY IYER · MARCH 2026 · DATA · AI · PHILOSOPHY
  </text>

  <!-- ── BOTTOM AMBER LINE ── -->
  <rect x="0" y="627" width="1200" height="3" fill="url(#amber-grad)"/>

</svg>
