<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C8921A" stop-opacity="0"/>
      <stop offset="35%" stop-color="#C8921A" stop-opacity="1"/>
      <stop offset="100%" stop-color="#B84A28" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="gBand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4285F4" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#4285F4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bBand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#008272" stop-opacity="0.11"/>
      <stop offset="100%" stop-color="#008272" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#F3EDE0"/>

  <!-- Grid texture -->
  <g opacity="0.045" stroke="#2A2010" stroke-width="0.6" fill="none">
    <line x1="0" y1="63" x2="1200" y2="63"/><line x1="0" y1="126" x2="1200" y2="126"/>
    <line x1="0" y1="189" x2="1200" y2="189"/><line x1="0" y1="252" x2="1200" y2="252"/>
    <line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="378" x2="1200" y2="378"/>
    <line x1="0" y1="441" x2="1200" y2="441"/><line x1="0" y1="504" x2="1200" y2="504"/>
    <line x1="0" y1="567" x2="1200" y2="567"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/>
  </g>

  <!-- Color washes -->
  <rect x="0" y="0" width="540" height="630" fill="url(#gBand)"/>
  <rect x="740" y="0" width="460" height="630" fill="url(#bBand)"/>

  <!-- Gold bars top/bottom -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#goldLine)"/>
  <rect x="0" y="625" width="1200" height="5" fill="url(#goldLine)"/>

  <!-- Left vertical rule -->
  <rect x="72" y="60" width="4" height="510" rx="2" fill="#C8921A" opacity="0.65"/>

  <!-- ── PIPELINE (right panel) ── -->
  <!-- Crawl -->
  <rect x="870" y="88" width="264" height="66" rx="12" fill="#4A7255" fill-opacity="0.15" stroke="#4A7255" stroke-width="1"/>
  <text font-family="Georgia,serif" font-size="13" font-weight="700" fill="#2A5040" x="1002" y="121" text-anchor="middle" dominant-baseline="central" letter-spacing="3">CRAWL</text>
  <text font-family="Helvetica,sans-serif" font-size="11" fill="#4A7255" x="1002" y="140" text-anchor="middle" dominant-baseline="central">Googlebot · Bingbot</text>
  <!-- arrow -->
  <line x1="1002" y1="154" x2="1002" y2="174" stroke="#7A6E58" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <polygon points="996,172 1002,182 1008,172" fill="#7A6E58" opacity="0.5"/>
  <!-- Index -->
  <rect x="870" y="183" width="264" height="66" rx="12" fill="#C8921A" fill-opacity="0.13" stroke="#C8921A" stroke-width="1"/>
  <text font-family="Georgia,serif" font-size="13" font-weight="700" fill="#7A4E10" x="1002" y="216" text-anchor="middle" dominant-baseline="central" letter-spacing="3">INDEX</text>
  <text font-family="Helvetica,sans-serif" font-size="11" fill="#9A6A20" x="1002" y="235" text-anchor="middle" dominant-baseline="central">Parse · store · categorise</text>
  <!-- arrow -->
  <line x1="1002" y1="249" x2="1002" y2="269" stroke="#7A6E58" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <polygon points="996,267 1002,277 1008,267" fill="#7A6E58" opacity="0.5"/>
  <!-- Rank -->
  <rect x="870" y="278" width="264" height="66" rx="12" fill="#4285F4" fill-opacity="0.12" stroke="#4285F4" stroke-width="1"/>
  <text font-family="Georgia,serif" font-size="13" font-weight="700" fill="#1A3D8A" x="1002" y="311" text-anchor="middle" dominant-baseline="central" letter-spacing="3">RANK</text>
  <text font-family="Helvetica,sans-serif" font-size="11" fill="#3060B0" x="1002" y="330" text-anchor="middle" dominant-baseline="central">Signals · authority · E-E-A-T</text>
  <!-- arrow -->
  <line x1="1002" y1="344" x2="1002" y2="364" stroke="#7A6E58" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <polygon points="996,362 1002,372 1008,362" fill="#7A6E58" opacity="0.5"/>
  <!-- AI Answer -->
  <rect x="870" y="373" width="264" height="66" rx="12" fill="#B84A28" fill-opacity="0.13" stroke="#B84A28" stroke-width="1"/>
  <text font-family="Georgia,serif" font-size="13" font-weight="700" fill="#6B2A14" x="1002" y="401" text-anchor="middle" dominant-baseline="central" letter-spacing="3">AI ANSWER</text>
  <text font-family="Helvetica,sans-serif" font-size="11" fill="#8A3C1E" x="1002" y="420" text-anchor="middle" dominant-baseline="central">Gemini · GPT-4 · Copilot</text>

  <!-- Pipeline label -->
  <text font-family="Helvetica,sans-serif" font-size="10" fill="#7A6E58" x="1002" y="468" text-anchor="middle" letter-spacing="2" opacity="0.7">HOW SEARCH WORKS</text>

  <!-- Engine badges -->
  <rect x="870" y="490" width="122" height="30" rx="15" fill="#4285F4" fill-opacity="0.16" stroke="#4285F4" stroke-width="0.8"/>
  <text font-family="Helvetica,sans-serif" font-size="11" fill="#1A3D8A" x="931" y="505" text-anchor="middle" dominant-baseline="central" font-weight="600">◉ Google</text>
  <rect x="1012" y="490" width="122" height="30" rx="15" fill="#008272" fill-opacity="0.16" stroke="#008272" stroke-width="0.8"/>
  <text font-family="Helvetica,sans-serif" font-size="11" fill="#054840" x="1073" y="505" text-anchor="middle" dominant-baseline="central" font-weight="600">◉ Bing</text>

  <!-- Divider line between text and pipeline -->
  <line x1="840" y1="80" x2="840" y2="550" stroke="#2A2010" stroke-width="0.6" opacity="0.1"/>

  <!-- ── MAIN TEXT (left panel) ── -->
  <!-- Kicker -->
  <text font-family="Helvetica,sans-serif" font-size="13" font-weight="600" fill="#C8921A" letter-spacing="4" x="96" y="108" dominant-baseline="auto">COMPLETE SEO GUIDE  ·  2025</text>

  <!-- Title line 1 -->
  <text font-family="Georgia,serif" font-size="88" font-weight="700" fill="#2A2010" x="96" y="240">From Crawler</text>
  <!-- Title line 2 italic -->
  <text font-family="Georgia,serif" font-size="88" font-weight="700" font-style="italic" fill="#C8921A" x="96" y="340">to Reasoning</text>
  <!-- Title line 3 -->
  <text font-family="Georgia,serif" font-size="88" font-weight="700" fill="#2A2010" x="96" y="440">Engine</text>

  <!-- Gold rule -->
  <rect x="96" y="458" width="440" height="3" rx="1.5" fill="#C8921A" opacity="0.45"/>

  <!-- Subtitle lines -->
  <text font-family="Helvetica,sans-serif" font-size="18" font-weight="300" fill="#7A6E58" x="96" y="496">robots.txt · sitemap.xml · Core Web Vitals</text>
  <text font-family="Helvetica,sans-serif" font-size="18" font-weight="300" fill="#7A6E58" x="96" y="524">Semantic clusters · Schema · E-E-A-T · Speakable</text>
  <text font-family="Helvetica,sans-serif" font-size="18" font-weight="300" fill="#7A6E58" x="96" y="552">Before vs after — the same page, two eras</text>

  <!-- Byline -->
  <text font-family="Helvetica,sans-serif" font-size="13" font-weight="400" fill="#7A6E58" letter-spacing="2" x="96" y="598">PaddySpeaks.com</text>
  <circle cx="236" cy="595" r="3" fill="#C8921A" opacity="0.6"/>
  <text font-family="Helvetica,sans-serif" font-size="13" font-weight="400" fill="#7A6E58" letter-spacing="2" x="248" y="598">March 2025</text>
</svg>
