<svg width="1100" height="520" viewBox="0 0 1100 520" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','Roboto',Arial,sans-serif">
  <defs>
    <linearGradient id="clicksGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#4285F4" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4285F4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="impressGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#5C3FBF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#5C3FBF" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="520" rx="12" fill="#F8F9FA"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="1100" height="56" rx="12" fill="white"/>
  <rect x="0" y="40" width="1100" height="16" fill="white"/>
  <line x1="0" y1="56" x2="1100" y2="56" stroke="#DADCE0" stroke-width="1"/>

  <!-- Google Search Console logo area -->
  <circle cx="32" cy="28" r="10" fill="#4285F4"/>
  <circle cx="32" cy="28" r="5" fill="white"/>
  <text x="52" y="33" font-size="15" font-weight="500" fill="#3C4043">Google Search Console</text>
  <text x="280" y="33" font-size="13" fill="#5F6368">Performance</text>

  <!-- Date filter pills -->
  <rect x="40" y="72" width="80" height="30" rx="15" fill="#E8F0FE" stroke="#4285F4" stroke-width="1"/>
  <text x="60" y="91" font-size="11" fill="#1A73E8" font-weight="500">28 days</text>
  <rect x="130" y="72" width="70" height="30" rx="15" fill="white" stroke="#DADCE0" stroke-width="1"/>
  <text x="144" y="91" font-size="11" fill="#5F6368">3 months</text>
  <rect x="210" y="72" width="100" height="30" rx="15" fill="white" stroke="#DADCE0" stroke-width="1"/>
  <text x="222" y="91" font-size="11" fill="#5F6368">Search type: Web</text>

  <!-- Metric cards -->
  <!-- Total clicks -->
  <rect x="40" y="118" width="240" height="72" rx="8" fill="#4285F4"/>
  <text x="58" y="144" font-size="12" fill="rgba(255,255,255,0.85)">Total clicks</text>
  <text x="58" y="175" font-size="26" font-weight="600" fill="white">14.2K</text>

  <!-- Total impressions -->
  <rect x="295" y="118" width="240" height="72" rx="8" fill="#5C3FBF"/>
  <text x="313" y="144" font-size="12" fill="rgba(255,255,255,0.85)">Total impressions</text>
  <text x="313" y="175" font-size="26" font-weight="600" fill="white">284K</text>

  <!-- Average CTR -->
  <rect x="550" y="118" width="240" height="72" rx="8" fill="white" stroke="#DADCE0" stroke-width="1"/>
  <text x="568" y="144" font-size="12" fill="#5F6368">Average CTR</text>
  <text x="568" y="175" font-size="26" font-weight="600" fill="#3C4043">5.0%</text>

  <!-- Average position -->
  <rect x="805" y="118" width="240" height="72" rx="8" fill="white" stroke="#DADCE0" stroke-width="1"/>
  <text x="823" y="144" font-size="12" fill="#5F6368">Average position</text>
  <text x="823" y="175" font-size="26" font-weight="600" fill="#3C4043">18.4</text>

  <!-- Chart area -->
  <rect x="40" y="210" width="1010" height="240" rx="8" fill="white" filter="url(#shadow)"/>

  <!-- Y-axis labels (clicks) -->
  <text x="52" y="232" font-size="10" fill="#4285F4">Clicks</text>
  <text x="52" y="258" font-size="9" fill="#9AA0A6">800</text>
  <text x="52" y="298" font-size="9" fill="#9AA0A6">600</text>
  <text x="52" y="338" font-size="9" fill="#9AA0A6">400</text>
  <text x="52" y="378" font-size="9" fill="#9AA0A6">200</text>
  <text x="52" y="418" font-size="9" fill="#9AA0A6">0</text>

  <!-- Y-axis labels (impressions) right side -->
  <text x="990" y="232" font-size="10" fill="#5C3FBF">Impressions</text>
  <text x="1010" y="258" font-size="9" fill="#9AA0A6">16K</text>
  <text x="1010" y="298" font-size="9" fill="#9AA0A6">12K</text>
  <text x="1010" y="338" font-size="9" fill="#9AA0A6">8K</text>
  <text x="1010" y="378" font-size="9" fill="#9AA0A6">4K</text>
  <text x="1010" y="418" font-size="9" fill="#9AA0A6">0</text>

  <!-- Grid lines -->
  <g stroke="#F1F3F4" stroke-width="0.5">
    <line x1="85" y1="255" x2="990" y2="255"/>
    <line x1="85" y1="295" x2="990" y2="295"/>
    <line x1="85" y1="335" x2="990" y2="335"/>
    <line x1="85" y1="375" x2="990" y2="375"/>
    <line x1="85" y1="415" x2="990" y2="415"/>
  </g>

  <!-- X-axis date labels -->
  <text x="110" y="438" font-size="9" fill="#9AA0A6">Feb 20</text>
  <text x="240" y="438" font-size="9" fill="#9AA0A6">Feb 25</text>
  <text x="370" y="438" font-size="9" fill="#9AA0A6">Mar 1</text>
  <text x="500" y="438" font-size="9" fill="#9AA0A6">Mar 5</text>
  <text x="630" y="438" font-size="9" fill="#9AA0A6">Mar 10</text>
  <text x="760" y="438" font-size="9" fill="#9AA0A6">Mar 15</text>
  <text x="890" y="438" font-size="9" fill="#9AA0A6">Mar 20</text>

  <!-- Impressions line (purple) with area fill - growing trend -->
  <path d="M110,395 L145,390 L180,385 L215,380 L250,375 L285,372 L320,365 L355,358 L390,350 L425,340 L460,335 L495,325 L530,315 L565,305 L600,298 L635,285 L670,278 L705,270 L740,265 L775,260 L810,258 L845,262 L880,255 L915,252 L950,250" fill="none" stroke="#5C3FBF" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M110,395 L145,390 L180,385 L215,380 L250,375 L285,372 L320,365 L355,358 L390,350 L425,340 L460,335 L495,325 L530,315 L565,305 L600,298 L635,285 L670,278 L705,270 L740,265 L775,260 L810,258 L845,262 L880,255 L915,252 L950,250 L950,415 L110,415 Z" fill="url(#impressGrad)"/>

  <!-- Clicks line (blue) with area fill - growing trend -->
  <path d="M110,410 L145,408 L180,405 L215,402 L250,398 L285,395 L320,388 L355,382 L390,375 L425,368 L460,362 L495,355 L530,348 L565,340 L600,335 L635,325 L670,318 L705,312 L740,308 L775,302 L810,298 L845,300 L880,295 L915,290 L950,288" fill="none" stroke="#4285F4" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M110,410 L145,408 L180,405 L215,402 L250,398 L285,395 L320,388 L355,382 L390,375 L425,368 L460,362 L495,355 L530,348 L565,340 L600,335 L635,325 L670,318 L705,312 L740,308 L775,302 L810,298 L845,300 L880,295 L915,290 L950,288 L950,415 L110,415 Z" fill="url(#clicksGrad)"/>

  <!-- Data point dots on latest values -->
  <circle cx="950" cy="250" r="4" fill="#5C3FBF"/>
  <circle cx="950" cy="288" r="4" fill="#4285F4"/>

  <!-- Bottom table area -->
  <rect x="40" y="460" width="1010" height="44" rx="8" fill="white" filter="url(#shadow)"/>
  <text x="60" y="486" font-size="12" font-weight="500" fill="#1A73E8">QUERIES</text>
  <line x1="130" y1="475" x2="130" y2="495" stroke="#E8EAED" stroke-width="1"/>
  <text x="150" y="486" font-size="12" fill="#5F6368">PAGES</text>
  <line x1="210" y1="475" x2="210" y2="495" stroke="#E8EAED" stroke-width="1"/>
  <text x="230" y="486" font-size="12" fill="#5F6368">COUNTRIES</text>
  <line x1="320" y1="475" x2="320" y2="495" stroke="#E8EAED" stroke-width="1"/>
  <text x="340" y="486" font-size="12" fill="#5F6368">DEVICES</text>

  <!-- Annotation callout -->
  <rect x="660" y="225" width="190" height="50" rx="6" fill="#FEF7E0" stroke="#FBBC04" stroke-width="1"/>
  <text x="675" y="245" font-size="11" font-weight="500" fill="#3C4043">Steady growth after</text>
  <text x="675" y="262" font-size="11" font-weight="500" fill="#3C4043">AI-native SEO applied</text>
  <line x1="755" y1="275" x2="755" y2="290" stroke="#FBBC04" stroke-width="1" stroke-dasharray="3,2"/>
</svg>