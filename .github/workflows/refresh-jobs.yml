name: Refresh Jobs Board

# Pulls real Data/AI-Engineer roles into interview.app/jobs/data/jobs.json from:
#   1. companies' public ATS boards (Greenhouse/Lever/Ashby — keyless), and
#   2. the Adzuna jobs API (broader coverage) IF the ADZUNA_APP_ID/ADZUNA_APP_KEY
#      repo secrets are set (otherwise that step no-ops).
# Board map for ATS: interview/scripts/ats_boards.json.
on:
  workflow_dispatch:
  schedule:
    - cron: '30 6 * * 1'   # Mondays 06:30 UTC

jobs:
  refresh-jobs:
    # Never run in mirror/fork repos.
    if: github.repository == 'paddyriyer/paddyspeaks'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Keyless ATS boards. Exits non-zero if it found nothing.
      - name: Fetch ATS boards
        continue-on-error: true
        run: python interview/scripts/fetch_jobs_feed.py --out feed_ats.json

      # Adzuna aggregator. No-ops (writes nothing) unless both secrets are set.
      - name: Fetch Adzuna
        continue-on-error: true
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        run: python interview/scripts/fetch_jobs_adzuna.py --out feed_adzuna.json

      # Rebuild from whichever feeds exist. Exits non-zero (leaving jobs.json
      # untouched) if both feeds are empty/absent, so we keep the last good board.
      - name: Rebuild board
        continue-on-error: true
        run: python interview/scripts/build_jobs.py --source feed_ats.json feed_adzuna.json

      - name: Commit if changed
        run: |
          git config user.name "PaddySpeaks Bot"
          git config user.email "bot@paddyspeaks.com"
          git add interview.app/jobs/data/jobs.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "🤖 Refresh jobs board — $(date +%Y-%m-%d)"
          git push
