name: Refresh Jobs Board

# Pulls real Data/AI-Engineer roles from companies' public ATS boards
# (Greenhouse / Lever / Ashby — keyless) into interview.app/jobs/data/jobs.json.
# Board map: interview/scripts/ats_boards.json (edit to add companies).
on:
  workflow_dispatch:
  schedule:
    - cron: '30 6 * * 1'   # Mondays 06:30 UTC

jobs:
  refresh-jobs:
    # Never run in mirror/fork repos.
    if: github.repository == 'paddyriyer/paddyspeaks'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Fetch live roles from the ATS boards. Exits non-zero if it found nothing
      # (network blip / all slugs stale) — we then keep the last good jobs.json
      # rather than wiping the board.
      - name: Fetch live jobs feed
        id: fetch
        continue-on-error: true
        run: python interview/scripts/fetch_jobs_feed.py --out feed.json

      - name: Rebuild board from live feed
        if: steps.fetch.outcome == 'success'
        run: python interview/scripts/build_jobs.py --source feed.json

      - name: Keep last-good board (feed came up empty)
        if: steps.fetch.outcome != 'success'
        run: echo "Live feed was empty or unreachable — leaving the existing jobs.json in place."

      - name: Commit if changed
        run: |
          git config user.name "PaddySpeaks Bot"
          git config user.email "bot@paddyspeaks.com"
          git add interview.app/jobs/data/jobs.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "🤖 Refresh jobs board — $(date +%Y-%m-%d)"
          git push
