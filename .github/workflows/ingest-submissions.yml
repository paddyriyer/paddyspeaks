name: Ingest Community Submissions

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  ingest:
    # Never run in mirror/fork repos (e.g. paddyspeaks-backup) — no secrets there
    if: github.repository == 'paddyriyer/paddyspeaks'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install anthropic

      - name: Ingest community submissions
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GSHEET_CSV_URL: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQR6l6cmujYC5HRzDwQAoz2OYhjhBber7xVmR5_J6ZMhW14nUpV126DM4Vu2-MEgNZdmgX7aI6iEaAC/pub?gid=399863191&single=true&output=csv"
        run: python .github/scripts/ingest_submissions.py

      - name: Commit and push
        run: |
          git config user.name "PaddySpeaks Bot"
          git config user.email "bot@paddyspeaks.com"
          git add interview.app/evaluate/data/ .github/scripts/processed_submissions.json
          git diff --cached --quiet && echo "No new questions" && exit 0
          git commit -m "🌍 Add community-submitted questions — $(date +%Y-%m-%d)"
          git push
