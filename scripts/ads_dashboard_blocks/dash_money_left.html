<h2 id="ap05-dash-money-left">Dashboard · Where the Money Is Left on the Table</h2>
<figure class="dash dash-waste" aria-label="Media spend waterfall — identifying waste">
  <div class="dash-head">
    <div>
      <div class="dash-eyebrow">Dashboard · Media Waste Waterfall</div>
      <h4 class="dash-title">$142,300 gross spend → $89,720 effective spend. Where does the other $52,580 go?</h4>
    </div>
  </div>

  <div class="waste-waterfall">
    <div class="wrow wrow-total">
      <div class="wrow-label">Gross spend</div>
      <div class="wrow-bar"><div class="wbar is-total" style="--w:100"></div></div>
      <div class="wrow-value">$142,300</div>
    </div>

    <div class="wrow wrow-drop">
      <div class="wrow-label">Invalid traffic (IVT, bots, fraud)</div>
      <div class="wrow-bar"><div class="wbar is-loss" style="--w:6.3"></div></div>
      <div class="wrow-value">−$9,000</div>
      <div class="wrow-why">Pre-bid + post-bid filtering reduces to ~2%; expected loss on open exchange.</div>
    </div>

    <div class="wrow wrow-drop">
      <div class="wrow-label">Viewability failures</div>
      <div class="wrow-bar"><div class="wbar is-loss" style="--w:4.9"></div></div>
      <div class="wrow-value">−$7,000</div>
      <div class="wrow-why">Ads rendered but not measurably visible. Pay-on-view or MRC-viewable pricing would recover this.</div>
    </div>

    <div class="wrow wrow-drop">
      <div class="wrow-label">Over-frequency (cap breaches)</div>
      <div class="wrow-bar"><div class="wbar is-loss" style="--w:9.0"></div></div>
      <div class="wrow-value">−$12,800</div>
      <div class="wrow-why"><strong>Largest single leak.</strong> 14% of the reached audience saw &gt;10 impressions in 7d. Enforce cap in the bidder, not post-hoc.</div>
    </div>

    <div class="wrow wrow-drop">
      <div class="wrow-label">Wrong-geo / wrong-lang spill</div>
      <div class="wrow-bar"><div class="wbar is-loss" style="--w:2.5"></div></div>
      <div class="wrow-value">−$3,500</div>
      <div class="wrow-why">IP→geo resolver miss rate at the edges. Tighten geo predicate on the bid filter.</div>
    </div>

    <div class="wrow wrow-drop">
      <div class="wrow-label">Creative fatigue (CTR decay post-day 10)</div>
      <div class="wrow-bar"><div class="wbar is-loss" style="--w:7.3"></div></div>
      <div class="wrow-value">−$10,380</div>
      <div class="wrow-why">Hero creative CTR down 22% in 14 days. Rotate at day 10, not day 20.</div>
    </div>

    <div class="wrow wrow-drop">
      <div class="wrow-label">Late-funnel attribution loss (iOS SKAN)</div>
      <div class="wrow-bar"><div class="wbar is-loss" style="--w:3.5"></div></div>
      <div class="wrow-value">−$5,000</div>
      <div class="wrow-why">SKAN postback timeout on iOS installs + privacy thresholding. Supplement with server-side CAPI.</div>
    </div>

    <div class="wrow wrow-drop">
      <div class="wrow-label">Duplicate attribution (cross-network)</div>
      <div class="wrow-bar"><div class="wbar is-loss" style="--w:3.4"></div></div>
      <div class="wrow-value">−$4,900</div>
      <div class="wrow-why">Same install credited to two networks because last-touch windows overlap. Reconcile with MMP.</div>
    </div>

    <div class="wrow wrow-total is-effective">
      <div class="wrow-label">Effective spend (working media)</div>
      <div class="wrow-bar"><div class="wbar is-kept" style="--w:63.1"></div></div>
      <div class="wrow-value">$89,720</div>
    </div>
  </div>

  <div class="waste-recap">
    <div class="recap-card recap-bad">

    <div class="recap-card recap-good">

    <div class="recap-card recap-warn">
      <div class="recap-label">Fastest fix (7-day)</div>
      <div class="recap-value">Creative rotation</div>
      <div class="recap-sub">Est. recovery: $6,800 / month</div>
    </div>
  </div>
