<hr>
<h2 id="ap05-dash-improvement">Dashboard · Campaign Improvement Opportunities</h2>
<figure class="dash dash-improve" aria-label="Campaign improvement priority matrix">
  <div class="dash-head">
    <div>
      <div class="dash-eyebrow">Dashboard · Priority Matrix · Impact × Effort</div>
      <h4 class="dash-title">Six moves you can make next. Bubble size = monthly $ recovery.</h4>
    </div>
  </div>

  <div class="improve-matrix-wrap">
    <div class="improve-matrix" id="improveMatrix">
      <div class="axis-y"><span>High impact</span><span>Low impact</span></div>
      <div class="axis-x"><span>Low effort</span><span>High effort</span></div>
      <div class="matrix-grid">
        <!-- Quadrants -->
        <div class="q q-do-now"><span>Do now</span></div>
        <div class="q q-schedule"><span>Schedule</span></div>
        <div class="q q-quick"><span>Nice-to-have</span></div>
        <div class="q q-defer"><span>Defer / deprioritize</span></div>

        <!-- Bubbles (data-x = 0..100 left→right, data-y = 0..100 top→bottom) -->
        <div class="bubble b1" style="--x:18%;--y:18%;--s:88" data-name="Enforce frequency cap" data-recov="$10.2K/mo"
             data-desc="Move cap enforcement into the bidder. 14% of audience saw >10 imps/7d. High-impact, low-effort.">
          <span class="b-tip">Frequency cap <strong>$10.2K/mo</strong></span>
        </div>
        <div class="bubble b2" style="--x:34%;--y:26%;--s:70" data-name="Creative rotation (day-10)" data-recov="$6.8K/mo"
             data-desc="Rotate hero creative at day 10 instead of day 20. CTR decay curves are well-documented.">
          <span class="b-tip">Creative rotation <strong>$6.8K/mo</strong></span>
        </div>
        <div class="bubble b3" style="--x:55%;--y:22%;--s:74" data-name="Tighten geo predicate" data-recov="$3.5K/mo"
             data-desc="IP→geo bidder filter misses at continental edges. Upgrade resolver. Moderate eng effort.">
          <span class="b-tip">Geo resolver <strong>$3.5K/mo</strong></span>
        </div>
        <div class="bubble b4" style="--x:72%;--y:30%;--s:62" data-name="Server-side CAPI" data-recov="$5.0K/mo"
             data-desc="Supplement SKAN with server-side Conversions API to recover iOS install attribution.">
          <span class="b-tip">Server-side CAPI <strong>$5.0K/mo</strong></span>
        </div>
        <div class="bubble b5" style="--x:40%;--y:62%;--s:40" data-name="Viewable-first pricing" data-recov="$2.1K/mo"
             data-desc="Negotiate viewable-only pricing tier with premium SSPs. Renegotiation cycle ~2 quarters.">
          <span class="b-tip">Viewable pricing <strong>$2.1K/mo</strong></span>
        </div>
        <div class="bubble b6" style="--x:78%;--y:72%;--s:30" data-name="MMP cross-network dedupe" data-recov="$1.6K/mo"
             data-desc="Coordinate attribution windows across networks. Political; needs legal + advertiser buy-in.">
          <span class="b-tip">Cross-net dedupe <strong>$1.6K/mo</strong></span>
        </div>
      </div>
    </div>

    <aside class="improve-detail" id="improveDetail">
      <div class="id-head">Click a bubble</div>
      <div class="id-body">Each circle is an improvement you can stage. Bubbles in the <em>Do now</em> quadrant recover the most money for the least engineering effort — start there.</div>
    </aside>
  </div>

  <div class="improve-total">
    <span>Sum of monthly recovery across all six: <strong>$29.2K/mo · $350K annualized</strong></span>
    <span class="improve-caveat">Assumes spend mix constant; each fix treated independently.</span>
  </div>
</figure>

<script type="module">
(function(){
var __init=function(){
  if (window.__dashImproveInit) return;
  window.__dashImproveInit = true;
  var detail = document.getElementById('improveDetail');
  document.querySelectorAll('.bubble').forEach(function(b){
    b.addEventListener('click', function(){
      document.querySelectorAll('.bubble').forEach(function(x){ x.classList.remove('is-active'); });
      b.classList.add('is-active');
      detail.innerHTML =
        '<div class="id-head">'+b.dataset.name+' · <strong>'+b.dataset.recov+'</strong></div>'+
        '<div class="id-body">'+b.dataset.desc+'</div>';
    });
  });
};
if("requestIdleCallback" in window) requestIdleCallback(__init, {timeout: 2000});
else setTimeout(__init, 0);
})();
</script>
