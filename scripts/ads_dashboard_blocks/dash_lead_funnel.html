<figure class="dash dash-lead" aria-label="Lead funnel and cycle time">
  <div class="dash-head">
    <div>
      <div class="dash-eyebrow">Dashboard · Lead Gen</div>
      <h4 class="dash-title">Leads → qualified → closed · with cycle time and ROAS</h4>
    </div>
    <div class="dash-kpis">
      <div class="kpi">
        <div class="kpi-label">Spend</div>
        <div class="kpi-value">$60,000</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Revenue</div>
        <div class="kpi-value">$450,000</div>
      </div>
      <div class="kpi kpi-highlight">
        <div class="kpi-label">ROAS</div>
        <div class="kpi-value">7.5×</div>
      </div>
    </div>
  </div>

  <div class="lead-grid">
    <div class="lead-funnel">
      <div class="lstage is-large" style="--w:100">
        <div class="lstage-name">Leads submitted</div>
        <div class="lstage-value">1,200</div>
        <div class="lstage-rate">Cost per lead · $50</div>
      </div>
      <div class="lstage-gap"><span>60% pass quality gate · 7d</span></div>
      <div class="lstage is-mid" style="--w:60">
        <div class="lstage-name">Qualified</div>
        <div class="lstage-value">720</div>
        <div class="lstage-rate">SQL-to-CRM lag · 7d</div>
      </div>
      <div class="lstage-gap"><span>25% close · 30d</span></div>
      <div class="lstage is-small" style="--w:15">
        <div class="lstage-name">Closed won</div>
        <div class="lstage-value">180</div>
        <div class="lstage-rate">Avg deal · $2,500</div>
      </div>
    </div>

    <div class="lead-cycle">
      <div class="cycle-title">Cycle-time distribution</div>
      <div class="cycle-plot">
        <div class="cycle-bar" style="--h:20" title="Day 1-7: 20%"></div>
        <div class="cycle-bar" style="--h:35" title="Day 8-14: 35%"></div>
        <div class="cycle-bar is-peak" style="--h:60" title="Day 15-21: 60%"></div>
        <div class="cycle-bar" style="--h:45" title="Day 22-28: 45%"></div>
        <div class="cycle-bar" style="--h:20" title="Day 29+: 20%"></div>
      </div>
      <div class="cycle-axis">
        <span>1-7d</span><span>8-14d</span><span class="is-peak">15-21d</span><span>22-28d</span><span>29d+</span>
      </div>
      <div class="cycle-call">
        <strong>Avg cycle · 18 days.</strong> Do not declare failure at week 2 — majority of closes land between day 15 and 28.
      </div>
    </div>
  </div>
</figure>
