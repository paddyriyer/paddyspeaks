# PaddySpeaks Analytics Worker Configuration
# ──────────────────────────────────────────
# Setup steps:
#   1. npm install -g wrangler
#   2. wrangler login
#   3. wrangler d1 create paddyspeaks-analytics
#   4. Copy the database_id into this file below
#   5. wrangler d1 execute paddyspeaks-analytics --file=schema.sql
#   6. Generate your password hash:
#        echo -n "YOUR_PASSWORD" | sha256sum
#      Copy the hash into ADMIN_PASSWORD_HASH below
#   7. wrangler deploy

name = "paddyspeaks-analytics"
main = "worker.js"
compatibility_date = "2024-09-01"

[[d1_databases]]
binding = "DB"
database_name = "paddyspeaks-analytics"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

[vars]
ADMIN_PASSWORD_HASH = "REPLACE_WITH_SHA256_OF_YOUR_PASSWORD"
