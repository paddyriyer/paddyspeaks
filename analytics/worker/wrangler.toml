# PaddySpeaks Analytics Worker Configuration
# ──────────────────────────────────────────
# Setup steps:
#   1. npm install -g wrangler
#   2. wrangler login
#   3. wrangler d1 create paddyspeaks-analytics
#   4. Copy the database_id into this file below
#   5. wrangler d1 execute paddyspeaks-analytics --file=schema.sql
#   6. Generate your password hash:
#        echo -n "YOUR_PASSWORD" | sha256sum
#      Copy the hash into ADMIN_PASSWORD_HASH below
#   7. wrangler deploy

name = "paddyspeaks"
main = "worker.js"
compatibility_date = "2024-09-01"

[[d1_databases]]
binding = "DB"
database_name = "paddyspeaks-analytics"
database_id = "f295b6c5-41e7-4e9f-9cff-6c095ce5c785"

# ── Anonymous leaderboard — SEPARATE D1 db (no PII crossover with analytics) ──
# Schema:  wrangler d1 execute paddyspeaks-leaderboard --file=leaderboard-schema.sql
#          (or paste leaderboard-schema.sql into the D1 Console in the dashboard)
[[d1_databases]]
binding = "LB"
database_name = "paddyspeaks-leaderboard"
database_id = "d49bd1fd-0460-4339-b46d-94f00981a4ad"

# ADMIN_PASSWORD_HASH is set as a Secret in the Cloudflare dashboard.
# LB_SIGNING_KEY (HMAC for attempt tokens) is also a Secret:
#   wrangler secret put LB_SIGNING_KEY     # 32+ random bytes
# Do NOT define secrets here — wrangler vars override dashboard secrets.
#
# NOTE: The AI Mock Interview tool (/interview.app/mock-ai/) is Bring-Your-Own-Key —
# the visitor's browser calls the Anthropic API directly with their own key. It
# does NOT go through this Worker and costs the site owner nothing, so there is
# no ANTHROPIC_API_KEY secret to set here.
# NOTE: routeLeaderboard() returns 503 "not configured" until both the LB
# binding above is uncommented and LB_SIGNING_KEY is set — so deploying this
# now is safe and changes nothing about the live analytics until you opt in.
