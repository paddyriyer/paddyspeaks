<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <title>Analytics Setup Helper</title>
    <style>
        body { font-family: system-ui; max-width: 600px; margin: 60px auto; padding: 0 20px; color: #1a2332; }
        h1 { font-size: 1.4rem; }
        label { display: block; margin-top: 20px; font-weight: 600; }
        input { width: 100%; padding: 10px; margin-top: 6px; border: 1.5px solid #c8d6e5; border-radius: 6px; font-size: 1rem; }
        button { margin-top: 12px; padding: 10px 24px; background: #2563a8; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; }
        .hash-output { margin-top: 12px; padding: 14px; background: #eef3f9; border-radius: 6px; font-family: monospace; word-break: break-all; font-size: 0.9rem; user-select: all; }
        .note { margin-top: 16px; padding: 14px; background: #fff8e1; border-left: 4px solid #d4a017; font-size: 0.9rem; border-radius: 4px; }
        .steps { line-height: 1.9; }
        code { background: #eef3f9; padding: 2px 6px; border-radius: 3px; font-size: 0.9em; }
    </style>
</head>
<body>
    <h1>Analytics Setup — Password Hash Generator</h1>
    <p>Choose a password for your analytics dashboard, then copy the SHA-256 hash below into your Cloudflare Worker settings.</p>

    <label for="pw">Your Dashboard Password</label>
    <input type="text" id="pw" placeholder="Enter a strong password">
    <button onclick="generateHash()">Generate SHA-256 Hash</button>
    <div class="hash-output" id="out" style="display:none"></div>

    <div class="note">
        <strong>Delete this file</strong> after setup. It's just a helper — not needed for the dashboard to work.
    </div>

    <script>
    async function generateHash() {
        var pw = document.getElementById('pw').value;
        if (!pw) return;
        var enc = new TextEncoder().encode(pw);
        var buf = await crypto.subtle.digest('SHA-256', enc);
        var hash = Array.from(new Uint8Array(buf)).map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
        var el = document.getElementById('out');
        el.style.display = 'block';
        el.textContent = hash;
    }
    </script>
</body>
</html>
